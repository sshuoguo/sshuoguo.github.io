<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Maintenance</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --text: #1f2937;
      --muted: #6b7280;
      --card: #ffffff;
      --line: #e5e7eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --card: #171a21;
        --line: #2a2f3a;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 24px;
    }

    .card {
      width: min(92%, 680px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 40px 32px;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Website Under Maintenance</h1>
    <p>
      This site is temporarily unavailable while I update its content and structure.
      Please check back later.
    </p>
  </main>
</body>
</html>
